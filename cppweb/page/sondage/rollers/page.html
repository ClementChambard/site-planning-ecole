<Modal popover_id="fillin-roller-modal" title="Sondage" action_label="Enregistrer" onclick="submit_roller_modal()">
  <div class="modal-body-container">
    <Heading title="Réponses" subtitle="Renseigner la pointure si vous n'avez pas de rollers" />
    <Checkbox label="Avez vous des rollers ?" name="has_roller" />
    <Checkbox label="Avez vous un casque ?" name="has_helmet" />
    <Checkbox label="Avez vous des protections ?" name="has_protect" />
    <Input label="Pointure" name="size" type="number" value="" />
  </div>
</Modal>

<div class="sondage-info"></div>
<div class="card-list-container"></div>

<template id="roller-card-template">
  <div class="sondage-card-container">
    <div class="sondage-card-name"></div>
    <div class="sondage-card-right">
      <div class="roller-card-left">
        <div class="roller-hasroller-line">
          <div id="has_roller">Roller</div>
          <span id="roller_size" class="text-color-none"></span>
        </div>
        <div id="has_helmet">Casque</div>
        <div id="has_protect">Protections</div>
      </div>
      <div class="roller-card-right" style="flex:1;">
        <button class="btn-component reduce-icon outline" type="button">
          <Icon size="24" icon="edit" class="btn-component-icon" />
          <span class="btn-component-label">Modifier</span>
        </button>
      </div>
      <button class="sondage-card-button transition">Répondre</button>
    </div>
  </div>
</template>
<script>
  function set_card_has_answered(card, val) {
    if (val) {
      card.querySelector(".roller-card-left").hidden = false;
      card.querySelector(".roller-card-right").hidden = false;
      card.querySelector(".sondage-card-button").hidden = true;
    } else {
      card.querySelector(".roller-card-left").hidden = true;
      card.querySelector(".roller-card-right").hidden = true;
      card.querySelector(".sondage-card-button").hidden = false;
    }
  }

  function set_card_has_roller(clone, val) {
    clone.querySelector("#has_roller").classList = val ? "text-color-ok" : "text-color-bad";
    clone.querySelector("#roller_size").hidden = !val;
  }

  function set_card_has_helmet(clone, val) {
    clone.querySelector("#has_helmet").classList = val ? "text-color-ok" : "text-color-bad";
  }

  function set_card_has_protect(clone, val) {
    clone.querySelector("#has_protect").classList = val ? "text-color-ok" : "text-color-bad";
  }

  function set_card_size(clone, val) {
    clone.querySelector("#roller_size").textContent = val;
  }

  const roller_card_template = document.querySelector("#roller-card-template");
  function create_roller_card(roller) {
    const clone = document.importNode(roller_card_template.content, true);
    clone.querySelector(".sondage-card-name").textContent = roller.eleve;
    clone.querySelector(".sondage-card-button").onclick = open_roller_modal.bind(0, roller.id);
    clone.querySelector('button[type="button"]').onclick = open_roller_modal.bind(0, roller.id);
    set_card_has_answered(clone, roller.has_answered);
    set_card_has_roller(clone, roller.has_roller);
    set_card_has_helmet(clone, roller.has_helmet);
    set_card_has_protect(clone, roller.has_protect);
    set_card_size(clone, roller.size);
    return clone;
  }

  let cur_roller = undefined;
  let cur_card = undefined;
  let rollers = [];
  const card_list = document.querySelector(".card-list-container");
  const modal = document.querySelector("#fillin-roller-modal");
  const roller_input = modal.querySelector('input[name="has_roller"]');
  const helmet_input = modal.querySelector('input[name="has_helmet"]');
  const protect_input = modal.querySelector('input[name="has_protect"]');
  const size_input = modal.querySelector('input[name="size"]');

  function open_roller_modal(idx) {
    let i = 0;
    for (r of rollers) {
      if (r.id == idx) {
        cur_roller = r;
        cur_card = card_list.children[i];
        break;
      }
      i++;
    }
    roller_input.checked = cur_roller.has_roller;
    helmet_input.checked = cur_roller.has_helmet;
    protect_input.checked = cur_roller.has_protect;
    size_input.value = cur_roller.size;
    modal.togglePopover();
  }

  function submit_roller_modal() {
    cur_roller.has_roller = roller_input.checked;
    cur_roller.has_helmet = helmet_input.checked;
    cur_roller.has_protect = protect_input.checked;
    cur_roller.size = parseInt(size_input.value);
    cur_roller.has_answered = true;
    set_card_has_roller(cur_card, cur_roller.has_roller);
    set_card_has_helmet(cur_card, cur_roller.has_helmet);
    set_card_has_protect(cur_card, cur_roller.has_protect);
    set_card_size(cur_card, cur_roller.size);
    set_card_has_answered(cur_card, cur_roller.has_answered);
    fetch(`/api/rollers/${cur_roller.id}`, {
      "method": "PUT",
      "body": JSON.stringify(cur_roller),
    });
    modal.togglePopover();
  }

  fetch("/api/sondages", {method: "GET", headers: {"Accept": "application/json"}})
    .then(response => response.json())
    .then(response => {
      for (o of response) {
        if (o.name !== "rollers") continue;
        document.querySelector(".sondage-info").textContent = o.desc;
        break;
      }
    });
  fetch("/api/rollers", {method: "GET", headers: {"Accept": "application/json"}})
    .then(response => response.json())
    .then(response => {
      rollers = response;
      for (o of response) {
        card_list.appendChild(create_roller_card(o));
      }
    });
</script>
