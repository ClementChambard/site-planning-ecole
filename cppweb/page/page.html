<div class="sondage-btns-container"></div>
<script>
  fetch("/api/sondages", {
    method: "GET",
    headers: {
      "Accept": "application/json",
    },
  }).then(response => response.json())
    .then(response => {
      const insert_into = document.querySelector(".sondage-btns-container");
      for (o of response) {
        if (!o.active) continue;
        const a = document.createElement("a");
        a.classList = "sondage-btn transition";
        a.href = o.route;
        a.textContent = o.btn_text;
        insert_into.appendChild(a);
      }
    });
</script>
